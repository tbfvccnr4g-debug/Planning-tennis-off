<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 Planning Saison — Coach Tennis</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2b4e">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --navy:#0d2b4e;
  --navy-2:#163f6e;
  --navy-3:#1e5490;
  --white:#ffffff;
  --gray:#f3f5f8;
  --gray-mid:#e3e8ef;
  --gray-dark:#8a94a3;
  --text:#1a2433;
  --accent:#c6f135;
  --accent-dark:#9dc21e;
  --danger:#e53e3e;
  --radius:14px;
  --shadow:0 2px 10px rgba(13,43,78,.08);
  --shadow-lg:0 12px 32px rgba(13,43,78,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  background:var(--gray);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{height:10px;width:10px;}
::-webkit-scrollbar-thumb{background:#c3ccd8;border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- HEADER ---------- */
header.app-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 60%,var(--navy-3) 100%);
  background-image:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 140px),
    linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 60%,var(--navy-3) 100%);
  color:var(--white);
  padding:18px 24px;
  position:sticky;top:0;z-index:40;
  box-shadow:var(--shadow-lg);
}
.header-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.35rem;letter-spacing:.2px;white-space:nowrap;}
.brand .ball{font-size:1.6rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));animation:spin 6s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:420px;}
.search-wrap input{
  width:100%;padding:10px 14px 10px 38px;border-radius:999px;border:none;
  background:rgba(255,255,255,.14);color:var(--white);font-size:.92rem;outline:none;
  transition:background .2s;
}
.search-wrap input::placeholder{color:#cfe0f5;}
.search-wrap input:focus{background:rgba(255,255,255,.24);}
.search-wrap i.fa-search{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#cfe0f5;}
.search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--white);
  border-radius:12px;box-shadow:var(--shadow-lg);color:var(--text);overflow:hidden;z-index:60;
  max-height:340px;overflow-y:auto;
}
.search-results .sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--gray-mid);display:flex;flex-direction:column;gap:2px;}
.search-results .sr-item:last-child{border-bottom:none;}
.search-results .sr-item:hover{background:var(--gray);}
.search-results .sr-name{font-weight:700;}
.search-results .sr-meta{font-size:.78rem;color:var(--gray-dark);}
.search-results .sr-empty{padding:14px;color:var(--gray-dark);font-size:.85rem;text-align:center;}

.header-actions{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
.btn{
  border:none;border-radius:10px;padding:9px 14px;font-size:.85rem;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,box-shadow .12s ease,background .15s;
  white-space:nowrap;
}
.btn:active{transform:scale(.96);}
.btn-ghost{background:rgba(255,255,255,.12);color:var(--white);}
.btn-ghost:hover{background:rgba(255,255,255,.22);}
.btn-accent{background:var(--accent);color:var(--navy);}
.btn-accent:hover{background:var(--accent-dark);box-shadow:0 4px 14px rgba(198,241,53,.4);}
.btn-primary{background:var(--navy-3);color:var(--white);}
.btn-primary:hover{background:var(--navy-2);}
.btn-danger{background:#fdecec;color:var(--danger);}
.btn-danger:hover{background:#fbd6d6;}
.btn-sm{padding:5px 10px;font-size:.75rem;border-radius:8px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ---------- DASHBOARD ---------- */
.dashboard{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;padding:18px 24px 6px;
}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;transition:transform .15s;
}
.stat-card:hover{transform:translateY(-2px);}
.stat-icon{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:#fff;flex-shrink:0;
}
.stat-num{font-size:1.4rem;font-weight:800;line-height:1;}
.stat-label{font-size:.72rem;color:var(--gray-dark);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

/* ---------- FILTERS ---------- */
.filters{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 24px;
}
.filters select,.filters input[type=text]{
  padding:8px 12px;border-radius:9px;border:1px solid var(--gray-mid);background:var(--white);
  font-size:.83rem;color:var(--text);outline:none;
}
.filters select:focus,.filters input:focus{border-color:var(--navy-3);}
.vendredi-toggle{display:flex;background:var(--gray-mid);border-radius:9px;padding:3px;gap:2px;}
.vendredi-toggle button{
  border:none;background:transparent;padding:6px 10px;border-radius:7px;font-size:.78rem;font-weight:600;
  cursor:pointer;color:var(--text);
}
.vendredi-toggle button.active{background:var(--navy);color:var(--white);}
.filters .reset{margin-left:auto;}

/* ---------- BOARD ---------- */
.board{
  display:flex;gap:14px;padding:8px 24px 40px;overflow-x:auto;align-items:flex-start;
  -webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;
}
.day-col{
  background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);flex:1 1 240px;min-width:240px;
  display:flex;flex-direction:column;overflow:hidden;
}
.day-head{
  background:var(--navy);color:var(--white);padding:12px 14px;font-weight:800;font-size:.95rem;
  display:flex;align-items:center;justify-content:space-between;
}
.day-head small{font-weight:500;opacity:.75;font-size:.68rem;}
.day-body{padding:10px;display:flex;flex-direction:column;gap:10px;}
.slot-block{background:var(--gray);border-radius:10px;padding:8px;}
.slot-time{font-size:.74rem;font-weight:700;color:var(--navy-2);display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:0 2px;}
.baby-badge{background:#e2e8f0;color:#4a5568;font-size:.62rem;padding:1px 6px;border-radius:6px;font-weight:700;}
.court-row{margin-bottom:6px;}
.court-row:last-child{margin-bottom:0;}

.empty-slot{
  border:2px dashed #cfd8e3;border-radius:9px;padding:8px;display:flex;align-items:center;justify-content:center;
  gap:6px;color:var(--gray-dark);font-size:.75rem;cursor:pointer;background:var(--white);transition:.15s;min-height:38px;
}
.empty-slot:hover{border-color:var(--navy-3);color:var(--navy-3);background:#eef4fb;}
.empty-slot.court-lbl::before{content:attr(data-court);font-weight:700;background:var(--gray-mid);border-radius:5px;padding:1px 6px;margin-right:2px;}

.group-card{
  border-radius:10px;background:var(--white);box-shadow:0 1px 4px rgba(13,43,78,.12);cursor:grab;
  overflow:hidden;border:1px solid var(--gray-mid);transition:box-shadow .15s,transform .12s;position:relative;
}
.group-card:hover{box-shadow:0 6px 16px rgba(13,43,78,.18);transform:translateY(-1px);}
.group-card.dragging{opacity:.4;}
.group-card .bar{height:5px;width:100%;}
.group-card .gc-body{padding:7px 9px 8px;}
.gc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.gc-name{font-weight:800;font-size:.82rem;line-height:1.2;}
.gc-court{font-size:.63rem;background:var(--gray-mid);color:var(--navy);padding:1px 6px;border-radius:6px;font-weight:700;flex-shrink:0;}
.gc-meta{font-size:.68rem;color:var(--gray-dark);margin-top:2px;display:flex;justify-content:space-between;align-items:center;gap:4px;}
.gc-count{font-weight:700;padding:1px 6px;border-radius:6px;font-size:.65rem;}
.gc-count.full{background:#fdecec;color:var(--danger);}
.gc-count.ok{background:#e7f8ee;color:#2f855a;}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;}
.chip{
  background:var(--gray);border:1px solid var(--gray-mid);border-radius:7px;padding:2px 6px;font-size:.63rem;
  cursor:grab;user-select:none;
}
.chip:active{cursor:grabbing;}
.gc-obs{margin-top:4px;font-size:.62rem;color:var(--gray-dark);font-style:italic;}

.group-card.highlight{animation:flash 1.1s ease;}
@keyframes flash{0%{box-shadow:0 0 0 4px var(--accent);}100%{box-shadow:0 1px 4px rgba(13,43,78,.12);}}
.drop-hover{outline:2px solid var(--accent);outline-offset:2px;}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(13,20,33,.55);display:none;align-items:center;justify-content:center;
  z-index:100;padding:18px;backdrop-filter:blur(2px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--white);border-radius:16px;max-width:640px;width:100%;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:pop .18s ease;
}
@keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--gray-mid);position:sticky;top:0;background:var(--white);z-index:2;
}
.modal-head h2{margin:0;font-size:1.05rem;}
.modal-head .close-x{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--gray-dark);padding:4px;}
.modal-body{padding:16px 20px 22px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid .full{grid-column:1/-1;}
.field label{display:block;font-size:.72rem;font-weight:700;color:var(--navy-2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--gray-mid);font-size:.86rem;outline:none;font-family:inherit;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy-3);}
.field textarea{resize:vertical;min-height:44px;}
.section-title{font-size:.85rem;font-weight:800;color:var(--navy);margin:18px 0 8px;display:flex;align-items:center;gap:6px;}
.divider{border:none;border-top:1px solid var(--gray-mid);margin:16px 0;}

.player-add-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--gray);padding:10px;border-radius:10px;}
.player-add-row .full{grid-column:1/-1;}
.player-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.player-item{
  display:flex;align-items:center;justify-content:space-between;background:var(--gray);border-radius:9px;padding:7px 10px;gap:8px;
}
.player-info{font-size:.78rem;}
.player-info b{font-size:.83rem;}
.player-info span{color:var(--gray-dark);margin-left:6px;}
.player-actions{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--gray-dark);font-size:.85rem;padding:4px 6px;border-radius:6px;}
.icon-btn:hover{background:var(--gray-mid);color:var(--navy);}
.icon-btn.del:hover{color:var(--danger);background:#fdecec;}

.modal-footer{display:flex;justify-content:space-between;gap:10px;padding-top:16px;border-top:1px solid var(--gray-mid);margin-top:6px;}

.toast{
  position:fixed;bottom:20px;right:20px;background:var(--navy);color:var(--white);padding:10px 18px;border-radius:10px;
  box-shadow:var(--shadow-lg);font-size:.85rem;z-index:200;display:flex;align-items:center;gap:8px;
  opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}

.empty-state{padding:60px 20px;text-align:center;color:var(--gray-dark);}
.empty-state i{font-size:2rem;margin-bottom:10px;display:block;}

.add-slot-btn{
  width:100%;margin-top:4px;padding:9px;border:2px dashed #cfd8e3;border-radius:9px;background:transparent;
  color:var(--navy-2);font-size:.76rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-slot-btn:hover{border-color:var(--navy-3);background:#eef4fb;}
.slot-day-section .section-title{margin-top:0;}
.slot-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.slot-chip{
  background:var(--gray);border:1px solid var(--gray-mid);border-radius:8px;padding:5px 6px 5px 10px;font-size:.78rem;
  display:inline-flex;align-items:center;gap:6px;font-weight:600;
}
.slot-chip .dur{color:var(--gray-dark);font-weight:500;font-size:.7rem;}
.slot-chip.occupied{background:#fff7e0;border-color:#f0d896;}
.slot-chip button{background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:2px 4px;border-radius:5px;font-size:.72rem;}
.slot-chip button:hover{background:#fdecec;color:var(--danger);}
.slot-add-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.slot-add-row input[type=time]{padding:7px 9px;border-radius:8px;border:1px solid var(--gray-mid);font-size:.82rem;}
.slot-add-row span{color:var(--gray-dark);font-size:.8rem;}
.slot-dur{font-size:.62rem;color:var(--gray-dark);font-weight:600;margin-left:4px;}

@media (max-width:760px){
  .board{flex-direction:column;}
  .day-col{min-width:100%;}
  .form-grid,.player-add-row{grid-template-columns:1fr;}
  .header-row{flex-direction:column;align-items:stretch;}
  .header-actions{margin-left:0;}
}

@media print{
  header.app-header .search-wrap,header.app-header .header-actions,.filters,.empty-slot,.gc-obs{display:none !important;}
  body{background:#fff;}
  .dashboard{page-break-after:avoid;}
  .board{overflow:visible;flex-wrap:wrap;}
  .day-col{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
  .group-card{break-inside:avoid;box-shadow:none;}
  .overlay{display:none !important;}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div class="brand"><span class="ball">🎾</span> Planning Saison</div>
    <div class="search-wrap">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="searchInput" placeholder="Rechercher un joueur...">
      <div class="search-results" id="searchResults" style="display:none;"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-accent btn-sm" id="btnSlots"><i class="fa-solid fa-clock"></i> Creneaux</button>
      <button class="btn btn-ghost btn-sm" id="btnExport"><i class="fa-solid fa-download"></i> Export JSON</button>
      <button class="btn btn-ghost btn-sm" id="btnImportTrigger"><i class="fa-solid fa-upload"></i> Import JSON</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
      <button class="btn btn-ghost btn-sm" id="btnPrint"><i class="fa-solid fa-print"></i> Imprimer / PDF</button>
    </div>
  </div>
</header>

<div class="dashboard" id="dashboard"></div>

<div class="filters">
  <select id="filterDay"><option value="">Tous les jours</option></select>
  <select id="filterCategory"><option value="">Toutes catégories</option></select>
  <input type="text" id="filterLevel" placeholder="Filtrer par niveau...">
  <button class="btn btn-ghost btn-sm reset" id="btnResetFilters" style="color:var(--navy);background:var(--gray-mid);"><i class="fa-solid fa-rotate-left"></i> Réinitialiser</button>
</div>

<div class="board" id="board"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg"></span></div>

<script>
/* =========================================================
   CONFIGURATION
   ========================================================= */
const CATEGORIES = {
  rouge:               { label:'Rouge',               emoji:'🔴', color:'#e53e3e' },
  orange:               { label:'Orange',               emoji:'🟠', color:'#ed8936' },
  vert:                 { label:'Vert',                 emoji:'🟢', color:'#38a169' },
  baby:                 { label:'Baby Tennis',          emoji:'⚪', color:'#8a94a3' },
  adultes_debutants:    { label:'Adultes débutants',    emoji:'🟡', color:'#d69e2e' },
  adultes_loisirs:      { label:'Adultes loisirs',      emoji:'🟡', color:'#ecc94b' },
  adultes_competition:  { label:'Adultes compétition',  emoji:'🟡', color:'#b7791f' },
  jeunes_competition:   { label:'Jeunes compétition',   emoji:'🔵', color:'#3182ce' },
};

const STD_SLOTS = ['17:00-18:00','18:00-19:00','19:00-20:00','20:00-21:30'];
const DEFAULT_SLOTS = {
  'Lundi':    [...STD_SLOTS],
  'Mardi':    [...STD_SLOTS],
  'Mercredi': ['08:45-09:45','09:45-10:30','10:30-11:30','11:30-12:30',
      '14:00-15:00','15:00-16:00','16:00-17:00','17:00-18:00',
      '18:00-19:00','19:00-20:00','20:00-21:30'],
  'Jeudi':    [...STD_SLOTS],
  'Vendredi': ['17:00-18:00','18:00-19:00','19:00-21:00'],
  'Samedi':   ['09:00-10:00','10:00-11:00','11:00-12:00','12:00-13:00'],
};
const DAY_ORDER = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const COURTS = [1]; // un seul terrain
const STORAGE_KEY = 'tennisSeasonPlanner_v1';
const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints>0);

function timeToMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function slotDurationMinutes(timeRange){
  const [s,e] = timeRange.split('-');
  return Math.max(0, timeToMinutes(e)-timeToMinutes(s));
}
function formatDuration(mins){
  const h = Math.floor(mins/60), m = mins%60;
  return m===0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}`;
}
function slotsForDay(day){ return (state.slots && state.slots[day]) ? state.slots[day] : []; }

/* =========================================================
   STATE
   ========================================================= */
let state = loadState();
let filters = { day:'', category:'', court:'', level:'' };
let modalPlayers = [];
let editingGroupId = null;
let editingPlayerIndex = null;
let dragPayload = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.groups)){
        if(!parsed.slots){ parsed.slots = JSON.parse(JSON.stringify(DEFAULT_SLOTS)); }
        return parsed;
      }
    }
  }catch(e){ console.warn('Lecture localStorage impossible', e); }
  return { groups: [], slots: JSON.parse(JSON.stringify(DEFAULT_SLOTS)) };
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showToast('Enregistré');
}
function uid(){ return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* =========================================================
   TOAST
   ========================================================= */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* =========================================================
   INIT FILTER SELECTS
   ========================================================= */
function initFilterOptions(){
  const daySel=document.getElementById('filterDay');
  DAY_ORDER.forEach(d=>{
    const o=document.createElement('option'); o.value=d; o.textContent=d; daySel.appendChild(o);
  });
  const catSel=document.getElementById('filterCategory');
  Object.entries(CATEGORIES).forEach(([key,c])=>{
    const o=document.createElement('option'); o.value=key; o.textContent=c.emoji+' '+c.label; catSel.appendChild(o);
  });
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function renderDashboard(){
  const groups = state.groups;
  const totalGroups = groups.length;
  const totalPlayers = groups.reduce((s,g)=>s+g.players.length,0);
  const placesRestantes = groups.reduce((s,g)=>s+Math.max(0,g.max-g.players.length),0);
  const count = key => groups.filter(g=>g.category===key).length;
  const babyCount = count('baby');
  const rougeCount = count('rouge');
  const orangeCount = count('orange');
  const vertCount = count('vert');
  const adultesCount = groups.filter(g=>g.category.startsWith('adultes')).length;
  const compCount = groups.filter(g=>g.category.includes('competition')).length;
  const totalSlotsMin = DAY_ORDER.reduce((s,d)=>s+slotsForDay(d).reduce((s2,t)=>s2+slotDurationMinutes(t),0),0);
  const busyMin = groups.reduce((s,g)=>s+slotDurationMinutes(g.time),0);

  const cards = [
    ['fa-layer-group', totalGroups, 'Groupes', '#1e5490'],
    ['fa-users', totalPlayers, 'Joueurs', '#0d2b4e'],
    ['fa-chair', placesRestantes, 'Places libres', '#38a169'],
    ['fa-hourglass-half', formatDuration(busyMin), 'Heures de cours / sem.', '#1e5490'],

}

/* =========================================================
   BOARD RENDER
   ========================================================= */
function findGroup(day,time){
  return state.groups.find(g=>g.day===day && g.time===time);
}
function groupPasses(g){
  if(filters.category && g.category!==filters.category) return false;
  if(filters.level && !(g.level||'').toLowerCase().includes(filters.level.toLowerCase())) return false;
  return true;
}

function renderBoard(){
  const board=document.getElementById('board');
  const days = filters.day ? [filters.day] : DAY_ORDER;
  board.innerHTML = days.map(day=>renderDayColumn(day)).join('');
  attachBoardDnD();
}

function renderDayColumn(day){
  const slots = slotsForDay(day);
  const totalMin = slots.reduce((s,t)=>s+slotDurationMinutes(t),0);
  const body = slots.map(time=>{
    const g = findGroup(day,time);
    let courtRows;
    if(!g){
      courtRows = `<div class="court-row">
        <div class="empty-slot" data-day="${day}" data-time="${time}" title="Ajouter un groupe">
          <i class="fa-solid fa-plus"></i> Ajouter un groupe
        </div>
      </div>`;
    } else if(!groupPasses(g)){
      courtRows = `<div class="court-row">
        <div class="empty-slot" style="opacity:.35;pointer-events:none;">filtré</div>
      </div>`;
    } else {
      courtRows = `<div class="court-row">${renderGroupCard(g)}</div>`;
    }
    return `<div class="slot-block">
      <div class="slot-time"><i class="fa-regular fa-clock"></i> ${time} <span class="slot-dur">(${formatDuration(slotDurationMinutes(time))})</span></div>
      ${courtRows}
    </div>`;
  }).join('');

  return `<div class="day-col">
    <div class="day-head"><span>${day}</span><small>${formatDuration(totalMin)}</small></div>
    <div class="day-body">${body}
      <button class="add-slot-btn" data-add-slot-day="${day}"><i class="fa-solid fa-plus"></i> Ajouter un horaire</button>
    </div>
  </div>`;
}

function renderGroupCard(g){
  const cat = CATEGORIES[g.category] || {label:g.category,color:'#999'};
  const count = g.players.length;
  const full = count>=g.max;
  const chips = g.players.map((p,idx)=>`<span class="chip" ${IS_TOUCH ? '' : 'draggable="true"'} data-group="${g.id}" data-pidx="${idx}">${escapeHtml(p.prenom||'')} ${p.nom?p.nom[0]+'.':''}</span>`).join('');
  return `<div class="group-card" ${IS_TOUCH ? '' : 'draggable="true"'} data-group-id="${g.id}">
    <div class="bar" style="background:${cat.color};"></div>
    <div class="gc-body">
      <div class="gc-top">
        <div class="gc-name">${escapeHtml(g.name)}</div>
      </div>
      <div class="gc-meta">
        <span>${cat.emoji} ${cat.label}${g.level?' · '+escapeHtml(g.level):''}</span>
        <span class="gc-count ${full?'full':'ok'}">${count}/${g.max}</span>
      </div>
      ${chips ? `<div class="chips">${chips}</div>` : ''}
      ${g.obs ? `<div class="gc-obs"><i class="fa-regular fa-note-sticky"></i> ${escapeHtml(g.obs)}</div>` : ''}
    </div>
  </div>`;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function renderAll(){
  renderDashboard();
  renderBoard();
}

/* =========================================================
   DRAG & DROP (groups + players)
   ========================================================= */
function attachBoardDnD(){
  document.querySelectorAll('[data-add-slot-day]').forEach(btn=>{
    btn.addEventListener('click', ()=>openSlotsModal(btn.dataset.addSlotDay));
  });
  // group cards - drag start
  document.querySelectorAll('.group-card').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      dragPayload = { type:'group', groupId: card.dataset.groupId };
      e.dataTransfer.setData('text/plain','group');
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
    card.addEventListener('click', e=>{
      if(e.target.closest('.chip')) return;
      openGroupModal(card.dataset.groupId);
    });
    card.addEventListener('dragover', e=>{ e.preventDefault(); card.classList.add('drop-hover'); });
    card.addEventListener('dragleave', ()=>card.classList.remove('drop-hover'));
    card.addEventListener('drop', e=>{
      e.preventDefault(); card.classList.remove('drop-hover');
      if(!dragPayload) return;
      const targetGroupId = card.dataset.groupId;
      if(dragPayload.type==='player'){
        movePlayerToGroup(dragPayload.groupId, dragPayload.pIndex, targetGroupId);
      }
      dragPayload=null;
    });
  });

  // player chips
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('dragstart', e=>{
      e.stopPropagation();
      dragPayload = { type:'player', groupId: chip.dataset.group, pIndex: Number(chip.dataset.pidx) };
      e.dataTransfer.setData('text/plain','player');
    });
  });

  // empty slots - click to add + drop target for group move
  document.querySelectorAll('.empty-slot[data-day]').forEach(slot=>{
    slot.addEventListener('click', ()=>{
      openGroupModal(null, { day:slot.dataset.day, time:slot.dataset.time });
    });
    slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('drop-hover'); });
    slot.addEventListener('dragleave', ()=>slot.classList.remove('drop-hover'));
    slot.addEventListener('drop', e=>{
      e.preventDefault(); slot.classList.remove('drop-hover');
      if(!dragPayload || dragPayload.type!=='group') return;
      const g = state.groups.find(x=>x.id===dragPayload.groupId);
      if(!g) return;
      const target = { day:slot.dataset.day, time:slot.dataset.time };
      const collide = findGroup(target.day,target.time);
      if(collide){ showToast('Créneau déjà occupé'); dragPayload=null; return; }
      g.day=target.day; g.time=target.time;
      saveState(); renderAll();
      dragPayload=null;
    });
  });
}

function movePlayerToGroup(sourceGroupId, pIndex, targetGroupId){
  if(sourceGroupId===targetGroupId) return;
  const source = state.groups.find(g=>g.id===sourceGroupId);
  const target = state.groups.find(g=>g.id===targetGroupId);
  if(!source || !target) return;
  const player = source.players[pIndex];
  if(!player) return;
  source.players.splice(pIndex,1);
  target.players.push(player);
  saveState(); renderAll();
  showToast(`${player.prenom} déplacé(e) vers ${target.name}`);
}

function startEditPlayer(idx){

  document.getElementById('p_obs').value = p.obs||'';
  document.getElementById('addPlayerLabel').textContent = 'Mettre à jour le joueur';

function handleAddOrUpdatePlayer(){
  const nom = document.getElementById('p_nom').value.trim();
  const prenom = document.getElementById('p_prenom').value.trim();
  if(!nom && !prenom){ showToast('Renseignez au moins un nom'); return; }
  const player = {
    nom, prenom,
    age: document.getElementById('p_age').value,
    tel: document.getElementById('p_tel').value.trim(),
    classement: document.getElementById('p_classement').value.trim(),
    niveau: document.getElementById('p_niveau').value.trim(),
    obs: document.getElementById('p_obs').value.trim(),
  };
  if(editingPlayerIndex!==null){
    modalPlayers[editingPlayerIndex] = player;
    editingPlayerIndex = null;
    document.getElementById('addPlayerLabel').textContent = 'Ajouter le joueur';
  } else {
    modalPlayers.push(player);
  }
  ['p_nom','p_prenom','p_age','p_tel','p_classement','p_niveau','p_obs'].forEach(id=>document.getElementById(id).value='');
  renderPlayerList();
}

function handleSaveGroup(){
  const name = document.getElementById('f_name').value.trim();
  if(!name){ showToast('Le nom du groupe est requis'); return; }
  const day = document.getElementById('f_day').value;
  const time = document.getElementById('f_time').value;
  const court = 1;
  const max = Math.max(1, Number(document.getElementById('f_max').value)||1);

  const collision = state.groups.find(g=> g.day===day && g.time===time && g.court===court && g.id!==editingGroupId);
  if(collision){ showToast('Ce créneau / terrain est déjà occupé par '+collision.name); return; }

  const groupObj = {
    id: editingGroupId || uid(),
    name, day, time, court, max,
    category: document.getElementById('f_category').value,
    level: document.getElementById('f_level').value.trim(),
    obs: document.getElementById('f_obs').value.trim(),
    players: modalPlayers,
  };

  if(editingGroupId){
    const idx = state.groups.findIndex(g=>g.id===editingGroupId);
    state.groups[idx] = groupObj;
  } else {
    state.groups.push(groupObj);
  }
  saveState();
  closeModal();
  renderAll();
}

function handleDeleteGroup(id){
  if(!confirm('Supprimer définitivement ce groupe et ses joueurs ?')) return;
  state.groups = state.groups.filter(g=>g.id!==id);
  saveState();
  closeModal();
  renderAll();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editingGroupId = null; modalPlayers=[]; editingPlayerIndex=null;
}

function openSlotsModal(focusDay){
  editingGroupId = null;
  const modal = document.getElementById('modalBox');
  modal.innerHTML = `
    <div class="modal-head">
      <h2><i class="fa-solid fa-clock"></i> Gerer les creneaux horaires</h2>
      <button class="close-x" id="closeModalX"><i class="fa-solid fa-xmark"></i></button>
    </div>

  `;
  renderSlotsModalBody(focusDay);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('closeModalX').onclick = closeModal;
}

function renderSlotsModalBody(focusDay){
  const body = document.getElementById('slotsModalBody');
  body.innerHTML = DAY_ORDER.map(day=>{
    const slots = state.slots[day] || [];
    const dayTotal = slots.reduce((s,t)=>s+slotDurationMinutes(t),0);
    const chipsHtml = slots.length ? slots.map(t=>{
      const occupied = !!findGroup(day,t);
      return `<span class="slot-chip ${occupied?'occupied':''}" title="${occupied?'Creneau occupe par un groupe':''}">
        ${t} <span class="dur">${formatDuration(slotDurationMinutes(t))}</span>
        <button data-del-slot-day="${day}" data-del-slot-time="${t}" title="Supprimer ce creneau"><i class="fa-solid fa-xmark"></i></button>
      </span>`;
    }).join('') : `<span style="font-size:.78rem;color:var(--gray-dark);">Aucun creneau</span>`;
    return `
      <div class="slot-day-section">
        <div class="section-title" style="margin-top:14px;">
          <i class="fa-regular fa-calendar"></i> ${day}
          <span style="margin-left:auto;font-size:.7rem;color:var(--gray-dark);font-weight:600;">${formatDuration(dayTotal)} au total</span>
        </div>
        <div class="slot-chips">${chipsHtml}</div>
        <div class="slot-add-row">
          <input type="time" id="start_${day}" step="300">
          <span>-></span>
          <input type="time" id="end_${day}" step="300">
          <button class="btn btn-primary btn-sm" data-add-slot="${day}"><i class="fa-solid fa-plus"></i> Ajouter</button>
        </div>
      </div>
      <hr class="divider">
    `;
  }).join('');

  body.querySelectorAll('[data-add-slot]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const day = btn.dataset.addSlot;
      const start = document.getElementById('start_'+day).value;
      const end = document.getElementById('end_'+day).value;
      if(!start || !end){ showToast('Renseigne une heure de debut et de fin'); return; }
      if(start>=end){ showToast("L'heure de fin doit etre apres le debut"); return; }
      const label = `${start}-${end}`;
      if(!state.slots[day]) state.slots[day] = [];
      if(state.slots[day].includes(label)){ showToast('Ce creneau existe deja'); return; }
      state.slots[day].push(label);
      state.slots[day].sort((a,b)=>timeToMinutes(a.split('-')[0])-timeToMinutes(b.split('-')[0]));
      saveState();
      renderSlotsModalBody(day);
      renderBoard();
      renderDashboard();
    });
  });

  body.querySelectorAll('[data-del-slot-day]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const day = btn.dataset.delSlotDay;
      const time = btn.dataset.delSlotTime;
      const g = findGroup(day,time);
      if(g){
        if(!confirm(`Le creneau ${time} du ${day} contient le groupe "${g.name}". Le supprimer quand meme ? Le groupe restera enregistre mais n'apparaitra plus sur le planning.`)) return;
      }
      state.slots[day] = (state.slots[day]||[]).filter(t=>t!==time);
      saveState();
      renderSlotsModalBody(day);
      renderBoard();
      renderDashboard();
    });
  });
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){ searchResults.style.display='none'; return; }
  const matches = [];
  state.groups.forEach(g=>{
    g.players.forEach((p,idx)=>{
      const full = `${p.prenom} ${p.nom}`.toLowerCase();
      if(full.includes(q)){ matches.push({p,g}); }
    });
  });
  if(matches.length===0){
    searchResults.innerHTML = `<div class="sr-empty">Aucun joueur trouvé</div>`;
  } else {
    searchResults.innerHTML = matches.slice(0,8).map(({p,g})=>`
      <div class="sr-item" data-group="${g.id}">
        <span class="sr-name">${escapeHtml(p.prenom)} ${escapeHtml(p.nom)}</span>
        <span class="sr-meta">${escapeHtml(g.name)} · ${g.day} ${g.time} · Terrain ${g.court}</span>
      </div>
    `).join('');
    searchResults.querySelectorAll('.sr-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        searchResults.style.display='none';
        searchInput.value='';
        locateGroup(el.dataset.group);
      });
    });
  }
  searchResults.style.display='block';
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) searchResults.style.display='none';
});

function locateGroup(groupId){
  const g = state.groups.find(x=>x.id===groupId);
  if(!g) return;
  filters.day=''; filters.category=''; filters.level='';
  document.getElementById('filterDay').value='';
  document.getElementById('filterCategory').value='';
  document.getElementById('filterLevel').value='';
  renderBoard();
  setTimeout(()=>{
    const card = document.querySelector(`.group-card[data-group-id="${groupId}"]`);
    if(card){
      card.scrollIntoView({behavior:'smooth', block:'center', inline:'center'});
      card.classList.add('highlight');
      setTimeout(()=>card.classList.remove('highlight'), 1200);
    }
  },50);
}

  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      if(!parsed || !Array.isArray(parsed.groups)) throw new Error('format invalide');
      if(!confirm('Importer ce fichier remplacera votre planning actuel. Continuer ?')) return;
      state = { groups: parsed.groups, slots: parsed.slots || JSON.parse(JSON.stringify(DEFAULT_SLOTS)) };
      saveState();
      renderAll();
      showToast('Import réussi');
    }catch(err){
      alert('Fichier JSON invalide.');
    }
  };
  reader.readAsText(file);
  e.target.value='';
});
document.getElementById('btnPrint').addEventListener('click', ()=>window.print());

/* =========================================================
   BOOT
   ========================================================= */
initFilterOptions();
renderAll();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.warn('SW non enregistré', err));
  });
}
</script>
